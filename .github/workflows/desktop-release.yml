name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Mac ───────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --include=dev

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Clean up any stuck DMG volumes
        run: |
          hdiutil detach "/Volumes/Henry AI" 2>/dev/null || true
          hdiutil detach "/Volumes/Henry AI 1" 2>/dev/null || true

      - name: Build Vite (Mac)
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Build Mac DMG (unsigned)
        timeout-minutes: 8
        run: npx electron-builder --mac --config.mac.identity=null --config.compression=normal --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: henry-mac
          path: release2/*.dmg
          retention-days: 30

  # ── Windows ───────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --include=dev

      - name: Rebuild native modules for Electron
        run: npm run rebuild
        continue-on-error: true

      - name: Build Vite (Windows)
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Build Windows installer
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: henry-win
          path: release2/*.exe
          retention-days: 30

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg-dev
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2 || true

      - name: Install dependencies
        run: npm install --legacy-peer-deps --include=dev

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Build Vite (Linux)
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Build Linux AppImage + deb
        run: npx electron-builder --linux --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: henry-linux-appimage
          path: release2/*.AppImage
          retention-days: 30

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: henry-linux-deb
          path: release2/*.deb
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
